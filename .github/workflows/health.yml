name: Health

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  health:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install project and dev dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check src/iopenpod scripts tests

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Architecture checks
        run: uv run python scripts/check_architecture.py

      - name: Packaging smoke test
        run: |
          uv build
          uv venv .wheel-smoke
          uv pip install --python .wheel-smoke/bin/python --no-deps dist/*.whl
          .wheel-smoke/bin/python scripts/smoke_test_installed_package.py
          .wheel-smoke/bin/iopenpod --version
