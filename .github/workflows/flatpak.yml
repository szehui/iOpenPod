name: Flatpak

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write   # needed to upload assets to the GitHub Release

jobs:
  flatpak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}

      - name: Update metainfo release version/date
        run: |
          python -c "
          from datetime import datetime, timezone
          import xml.etree.ElementTree as ET

          path = 'flatpak/io.github.therealsavi.iOpenPod.metainfo.xml'
          version = '${{ github.event.inputs.tag_name }}'.lstrip('v.')
          date = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          tree = ET.parse(path)
          root = tree.getroot()
          releases = root.find('releases')
          if releases is None:
              releases = ET.SubElement(root, 'releases')
          release = releases.find('release')
          if release is None:
              release = ET.SubElement(releases, 'release')

          release.set('version', version)
          release.set('date', date)
          tree.write(path, encoding='UTF-8', xml_declaration=True)

          print(f'Updated {path} -> version={version}, date={date}')
          "

      # ── Python + uv ───────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Qt runtime libraries required for the PyInstaller build step.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-util1 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libxkbcommon0

      - name: Install project dependencies
        run: uv sync

      # ── Build the PyInstaller one-folder bundle ───────────────────────
      - name: Build with PyInstaller
        run: uv run pyinstaller iOpenPod.spec --noconfirm

      # ── Package as a Flatpak bundle ───────────────────────────────────
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak remote-modify --enable flathub
          flatpak --system remotes --show-details

      - name: Install Flatpak SDK/runtime
        run: |
          sudo flatpak install -y --system flathub \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Sdk.Locale//25.08 \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Platform.GL.default//25.08 \
            org.freedesktop.Platform.openh264//2.5.1

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: iOpenPod-Linux.flatpak
          manifest-path: flatpak/io.github.therealsavi.iOpenPod.yml
          cache-key: flatpak-builder-${{ github.sha }}

      # ── Checksum ──────────────────────────────────────────────────────
      - name: Generate SHA-256 checksum
        run: |
          python -c "
          import hashlib, pathlib
          p = pathlib.Path('iOpenPod-Linux.flatpak')
          h = hashlib.sha256(p.read_bytes()).hexdigest()
          out = f'{h}  {p.name}\n'
          pathlib.Path(p.name + '.sha256').write_text(out)
          print(out.strip())
          "

      # ── Attach to GitHub Release ──────────────────────────────────────
      - name: Upload Flatpak bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: |
            iOpenPod-Linux.flatpak
            iOpenPod-Linux.flatpak.sha256
