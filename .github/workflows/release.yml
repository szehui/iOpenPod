# Build multi-platform binaries and publish a GitHub Release on every tag.
#
# Trigger: push a tag like v1.0.0 (or v1.2.3-beta.1, etc.)
#
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: write           # needed to dispatch the Flatpak workflow
  contents: write          # needed to create GitHub Releases

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: iOpenPod-Windows
            archive_name: iOpenPod-Windows.zip

          - os: macos-14          # Apple Silicon (arm64); Intel Macs use Rosetta 2
            artifact: iOpenPod-macOS
            archive_name: iOpenPod-macOS.zip

          - os: ubuntu-22.04
            artifact: iOpenPod-Linux
            archive_name: iOpenPod-Linux.tar.gz
            appimage_name: iOpenPod-Linux-x86_64.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python + uv ─────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # Linux: install Qt runtime deps (no display needed for build)
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-util1 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libxkbcommon0

      - name: Install project dependencies
        run: uv sync

      # ── PyInstaller build ───────────────────────────────────────────
      - name: Build with PyInstaller
        run: uv run pyinstaller iOpenPod.spec --noconfirm

      # ── Package archive ─────────────────────────────────────────────
      # macOS: ad-hoc sign all binaries so Gatekeeper doesn't kill the app
      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          # Re-sign every Mach-O binary inside the bundle (inside-out).
          # --options runtime is intentionally omitted: Hardened Runtime
          # triggers strict PAC checks in CoreFoundation on macOS 26+
          # that crash PyInstaller-frozen Qt apps during bundle init.
          # Hardened Runtime is only needed for notarization (we don't notarize).
          find dist/iOpenPod.app/Contents/Frameworks \
               dist/iOpenPod.app/Contents/Resources \
               -type f -perm +111 -print0 \
            | xargs -0 file \
            | grep -i 'mach-o' \
            | cut -d: -f1 \
            | while read f; do
                codesign --force --sign - "$f"
              done
          codesign --force --sign - dist/iOpenPod.app/Contents/MacOS/iOpenPod
          codesign --force --sign - dist/iOpenPod.app
          # Verify
          codesign --verify --deep --strict dist/iOpenPod.app
          echo "Code signing verified OK"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\iOpenPod\* -DestinationPath iOpenPod-Windows.zip
        shell: pwsh

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        run: cd dist && ditto -c -k --keepParent --sequesterRsrc iOpenPod.app ../${{ matrix.archive_name }}

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar czf ../${{ matrix.archive_name }} iOpenPod/

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L --fail -o appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          rm -rf AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications

          # Preserve PyInstaller one-folder layout so the binary can load _internal/*.
          cp -a dist/iOpenPod/. AppDir/usr/bin/

          cat > AppDir/iOpenPod.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=iOpenPod
          Exec=iOpenPod
          Icon=iOpenPod
          Categories=AudioVideo;Utility;
          Terminal=false
          EOF
          cp AppDir/iOpenPod.desktop AppDir/usr/share/applications/iOpenPod.desktop

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          APPBIN="$HERE/usr/bin"

          export PATH="$APPBIN:$PATH"
          export LD_LIBRARY_PATH="$APPBIN/_internal:$APPBIN/_internal/Qt/lib:$APPBIN/_internal/lib:${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="$APPBIN/_internal/plugins:${QT_PLUGIN_PATH:-}"
          export QML2_IMPORT_PATH="$APPBIN/_internal/qml:${QML2_IMPORT_PATH:-}"

          exec "$APPBIN/iOpenPod" "$@"
          EOF
          chmod +x AppDir/AppRun

          cp src/iopenpod/assets/icons/icon-256.png AppDir/iOpenPod.png

          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run \
            AppDir "${{ matrix.appimage_name }}"

      # ── Checksums ───────────────────────────────────────────────────
      - name: Generate SHA-256 checksum
        run: |
          python -c "
          import hashlib, pathlib, sys
          p = pathlib.Path('${{ matrix.archive_name }}')
          h = hashlib.sha256(p.read_bytes()).hexdigest()
          out = f'{h}  {p.name}\n'
          pathlib.Path(p.name + '.sha256').write_text(out)
          print(out.strip())
          "

      - name: Generate SHA-256 checksum (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          python -c "
          import hashlib, pathlib
          p = pathlib.Path('${{ matrix.appimage_name }}')
          h = hashlib.sha256(p.read_bytes()).hexdigest()
          out = f'{h}  {p.name}\n'
          pathlib.Path(p.name + '.sha256').write_text(out)
          print(out.strip())
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

      - name: Upload AppImage artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: iOpenPod-Linux-AppImage
          path: |
            ${{ matrix.appimage_name }}
            ${{ matrix.appimage_name }}.sha256

  # ── Build Python distributions for PyPI ─────────────────────────────────
  python-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          tag_name = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{version}"
          if tag_name != expected_tag:
              raise SystemExit(
                  f"Refusing to publish: tag {tag_name!r} does not match pyproject version {version!r}"
              )
          print(f"Publishing Python package version {version} from tag {tag_name}")
          PY

      - name: Build Python distributions
        run: uv build

      - name: Upload Python distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: iopenpod-python-dist
          if-no-files-found: error
          path: |
            dist/*.whl
            dist/*.tar.gz

  # ── Publish GitHub Release ──────────────────────────────────────────────
  release:
    needs:
      - build
      - python-dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: iOpenPod-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
            *.AppImage
            *.sha256

  # ── Publish to PyPI via Trusted Publishing ──────────────────────────────
  pypi-publish:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: iopenpod-python-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  trigger-flatpak:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Flatpak workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'flatpak.yml',
              ref: context.ref.replace('refs/tags/', ''),
              inputs: {
                tag_name: context.ref.replace('refs/tags/', '')
              }
            })
